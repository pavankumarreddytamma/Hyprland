general {
    gaps_in = 4
    gaps_out = 8

    border_size = 2
    

    col.active_border = rgba(255,255,255,0.5)
    col.inactive_border = rgba(76,57,57,0.32)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    allow_tearing = true

    layout = dwindle

    resize_on_border = false
    extend_border_grab_area = 15



}

decoration {
    rounding = 6
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 0.9

    #dim_inactive = true
    #dim_strength = 0.3

    shadow {
        enabled = false
        range = 42
        render_power = 4
        color = rgb(000000)
        scale = 1
    }

    blur {
        enabled = true
        size = 10
        passes = 2
        new_optimizations = true
        xray = false
    }
}



# -----------------------------------------------------
# Animation engine
# -----------------------------------------------------
animations {
    enabled = true

    # Poppy Bezier: Fast start with a slight overshoot/bounce
    bezier = poppy, 0.13, 1, 0.36, 1.1

    # Snappy Windows: Using 'popin' is less resource intensive than complex slides
    animation = windows, 1, 5, poppy, popin 80%
    animation = windowsIn, 1, 4, poppy, popin 80%
    animation = windowsOut, 1, 3, poppy, popin 80%
    
    # Smooth Workspaces: Slide effects feel premium but keep the speed high for smoothness
    animation = workspaces, 1, 5, poppy, slide
    
    # Static Elements: Keep fade and border fast to save frames
    animation = fade, 1, 4, default
    animation = border, 1, 5, default
}


