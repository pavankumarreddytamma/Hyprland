general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(255,255,255,0.5)
    col.inactive_border = rgba(76,57,57,0.32)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false
    allow_tearing = true
    layout = scrolling
    resize_on_border = false
    extend_border_grab_area = 15



}

decoration {
    rounding = 6
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 0.9

    #dim_inactive = true
    #dim_strength = 0.3

    shadow {
        enabled = false
        range = 42
        render_power = 4
        color = rgb(000000)
        scale = 1
    }

    blur {
        enabled = true
        size = 11
        passes = 3
        new_optimizations = true
        xray = false
    }
}



# -----------------------------------------------------
# Animation engine
# -----------------------------------------------------

animations {
    enabled = true

    bezier = windowsin, 0.51,0.36,0.47,0.91
    bezier = workspace, 0.24,0.65,0.47,0.98
    bezier = windowsout, 0.83,0.26,0,0.98
    bezier = windows, 0.7,0.42,0,0.99

    animation = windows, 1, 7, windows, slide
    animation = windowsIn, 1, 6, windowsin, popin 40%
    animation = windowsOut, 1, 7, windowsout, slidefade
    
    animation = workspaces, 1, 7, workspace, slide
    
    animation = fade, 1, 7, windows
    animation = border, 1, 7, windows
}


# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
