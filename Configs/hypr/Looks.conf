#     name = no-gaps-f1
#     match:float = false
#     match:workspace = f[1]
#
#     border_size = 0
#     rounding = 0
# }


dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}


master {
    new_status = master
}


misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
    disable_autoreload = false
    vfr = true
}

opengl {
    nvidia_anti_flicker = true
}

render {
   new_render_scheduling = false
   direct_scanout = true
}

cursor {
    sync_gsettings_theme = true
    no_hardware_cursors = 1
      
}

#layer rules
layerrule = animation slide, match:namespace rofi
layerrule = blur on, match:namespace rofi
layerrule = blur on, match:namespace swaync
layerrule = dim_around on, match:namespace rofi
layerrule = ignore_alpha a, match:namespace rofi
#layerrule = blur on, match:namespace waybar

#Tearing for games
#windowrule = match:class overwatch, immediate yes



